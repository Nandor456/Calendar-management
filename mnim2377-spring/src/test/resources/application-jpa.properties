# Test-time JPA configuration for the 'jpa' profile.
# Overrides main resources so tests don't require a running PostgreSQL.

spring.datasource.url=jdbc:h2:mem:idde_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

