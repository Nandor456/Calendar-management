# JPA profile (PostgreSQL)
# Uses the same DB settings as jdbc profile; keep them here so activating 'jpa'
# is enough to run Hibernate.

spring.datasource.username=idde_user
spring.datasource.password=idde_password
spring.datasource.url=jdbc:postgresql://localhost:5434/idde_db
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate/JPA behavior
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Useful during development; can be turned off later
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

