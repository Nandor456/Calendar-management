# JPA profile configuration
# NOTE: matches the existing postgres docker-compose setup used by the JDBC profile.

spring.datasource.username=idde_user
spring.datasource.password=idde_password
spring.datasource.url=jdbc:postgresql://localhost:5434/idde_db
spring.datasource.driver-class-name=org.postgresql.Driver

# Let Hibernate manage schema in dev; adjust to 'validate' if schema is managed externally.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

