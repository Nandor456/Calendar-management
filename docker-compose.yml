
services:
  postgres:
    image: postgres:16
    container_name: idde-springboot-postgres
    restart: always
    environment:
      POSTGRES_USER: idde_user
      POSTGRES_PASSWORD: idde_password
      POSTGRES_DB: idde_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_idde_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_idde_data:
